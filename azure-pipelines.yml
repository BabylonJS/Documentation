trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: 22.x
  NPM_CONFIG_CACHE: $(Pipeline.Workspace)/.npm
  SNAPSHOT_ARCHIVE: $(Build.ArtifactStagingDirectory)/documentation-$(Build.BuildId).tar.gz

steps:
  - checkout: self
    clean: true

  - task: NodeTool@0
    displayName: Use Node $(NODE_VERSION)
    inputs:
      versionSpec: $(NODE_VERSION)

  - task: Cache@2
    displayName: Cache npm packages
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(NPM_CONFIG_CACHE)

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build:ci
    displayName: Build static export with sitemap
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))

  - script: npm run build
    displayName: Build static export
    condition: and(succeeded(), ne(variables['Build.SourceBranch'], 'refs/heads/master'))

  - script: |
      set -euo pipefail
      test -f out/index.html
    displayName: Verify static export output

  - publish: out
    artifact: static-export
    displayName: Publish static export artifact

  - script: |
      set -euo pipefail
      : "${DEPLOYMENT_SERVER:?DEPLOYMENT_SERVER pipeline variable is required for PR snapshot upload.}"
      : "${DEPLOY_TOKEN:?DEPLOY_TOKEN pipeline variable is required for PR snapshot upload.}"

      tar -czf "$(SNAPSHOT_ARCHIVE)" -C out .

      curl --fail --show-error --silent \
        --request POST \
        --header "Authorization: Bearer ${DEPLOY_TOKEN}" \
        --form "snapshot=@$(SNAPSHOT_ARCHIVE)" \
        --form "repository=$(Build.Repository.Name)" \
        --form "buildId=$(Build.BuildId)" \
        --form "pullRequestId=$(System.PullRequest.PullRequestId)" \
        --form "pullRequestNumber=$(System.PullRequest.PullRequestNumber)" \
        --form "sourceBranch=$(System.PullRequest.SourceBranch)" \
        --form "targetBranch=$(System.PullRequest.TargetBranch)" \
        "${DEPLOYMENT_SERVER}"
    displayName: Upload PR snapshot
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    env:
      DEPLOYMENT_SERVER: $(DEPLOYMENT_SERVER)
      DEPLOY_TOKEN: $(DEPLOY_TOKEN)
